# Site settings
title: Richard's Portfolio Website
description: 'Home to my projects completed for academic, self-learning, and hobby purposes.'
url: 'richardcsuwandi.github.io/'
baseurl: ''

# google_analytics: 'UA-XXXXXX-X'
# disqus_shortname: 'your-disqus-name'

author:
  name: 'Richard Cornelius Suwandi'
  email: richardsuwandi@link.cuhk.edu.cn
  twitter_username: richardcsuwandi
  medium_username: richardcsuwandi
  github_username: richardcsuwandi
  linkedin_username: richardcsuwandi

defaults:
  -
    scope:
      path: ''
      type: 'posts'
    values:
        layout: 'post'

# Build settings
destination: _site
paginate: 10
permalink: /:year/:title/
markdown: kramdown
highlighter: rouge

sass:
    sass_dir: _sass
    style: compressed

kramdown:
  # use Github Flavored Markdown
  input: GFM
  # do not replace newlines by <br>s
  hard_wrap: false

plugins: ['jekyll-paginate']
exclude: ['README.md', 'Gemfile', 'Gemfile.lock', 'screenshot.png']
